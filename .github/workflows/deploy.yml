name: Deploy to Yandex Cloud Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --only=production

      - name: Deploy Function
        id: sls-func
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ secrets.FOLDER_ID }}
          function-name: 'my-git-site'
          runtime: 'nodejs18'
          entrypoint: 'index.handler'
          memory: '256Mb'
          service-account-id: ${{ secrets.SERVICE_ACCOUNT_ID }}   # ✅ добавляем ID сервисного аккаунта
          include: |
            ./index.js
            ./node_modules
            package.json
          exclude: |
            **/*.ts
          async: false