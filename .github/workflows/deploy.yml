name: Deploy to Yandex Cloud VM

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /opt/honkai-chat
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build all workspaces
        run: npm run build

      - name: Copy scenario to server dist
        run: cp -r server/src/scenario server/dist/scenario

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync files to VM
        run: |
          rsync -avz --delete \
            --include='package.json' \
            --include='package-lock.json' \
            --include='shared/***' \
            --include='server/package.json' \
            --include='server/dist/***' \
            --include='client/dist/***' \
            --exclude='*' \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Install production deps and restart
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/honkai-chat
            npm install --omit=dev
            pm2 restart honkai-chat || pm2 start server/dist/index.js --name honkai-chat
            pm2 save
          EOF
